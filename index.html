<script>
let mediaRecorder;
let audioChunks = [];
let ws;

// 🔌 Connect WebSocket
function connectWebSocket() {
  ws = new WebSocket("wss://unsubrogated-monochromatically-destinee.ngrok-free.dev/ws");

  ws.onopen = () => {
    console.log("Connected to backend");
  };

  ws.onmessage = async (event) => {
    const parsed = JSON.parse(event.data);

    document.getElementById("asrText").innerText = parsed.asr_text;
    document.getElementById("translatedText").innerText = parsed.translated_text;

    // 🔊 Play backend audio
    if (parsed.audio_base64) {
      playAudioFromBase64(parsed.audio_base64);
    }
  };

  ws.onerror = (err) => {
    console.log("WebSocket error:", err);
  };

  ws.onclose = () => {
    console.log("Disconnected from backend");
  };
}

connectWebSocket();

// 🎤 Start Recording
async function startRecording() {
  audioChunks = [];

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = event => {
    audioChunks.push(event.data);
  };

  mediaRecorder.start();
  console.log("Recording started");
}

// 🛑 Stop Recording
function stopRecording() {
  mediaRecorder.stop();

  mediaRecorder.onstop = async () => {
    console.log("Recording stopped");

    const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

    const arrayBuffer = await audioBlob.arrayBuffer();
    const uint8Array = new Uint8Array(arrayBuffer);

    const src = document.getElementById("srcLang").value;
    const tgt = document.getElementById("tgtLang").value;

    ws.send(JSON.stringify({ src: src, tgt: tgt }));

    setTimeout(() => {
      ws.send(uint8Array);
      console.log("Audio sent to backend");
    }, 100);
  };
}

// 🔊 Play backend MP3 audio
function playAudioFromBase64(base64String) {
  const binaryString = atob(base64String);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);

  for (let i = 0; i < len; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }

  const blob = new Blob([bytes], { type: "audio/mp3" });
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceBridge — Real-Time Translation</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #050a12;
      --panel:     #0b1220;
      --border:    #1a2e4a;
      --accent:    #00d4ff;
      --accent2:   #7b2fff;
      --green:     #00bb77;
      --text:      #c8ddf0;
      --dim:       #4a6785;
      --glow-c:    rgba(0,212,255,.35);
      --glow-v:    rgba(123,47,255,.35);
      --star-color: rgba(255,255,255,.6);
      --grid-color: rgba(0,212,255,.03);
    }

    [data-theme="light"] {
      --bg:        #f0f4fa;
      --panel:     #ffffff;
      --border:    #c8d8ee;
      --accent:    #0088cc;
      --accent2:   #6920e0;
      --green:     #008855;
      --text:      #1a2e4a;
      --dim:       #7a95b5;
      --glow-c:    rgba(0,136,204,.25);
      --glow-v:    rgba(105,32,224,.25);
      --star-color: rgba(0,100,200,.25);
      --grid-color: rgba(0,136,204,.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
       font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background .4s, color .4s;
    }

    /* ── star-field background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 55%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 25%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 75%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 40%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 20% 85%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 10%, var(--star-color) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 90%, var(--star-color) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── grid overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* ── header ── */
    header {
      text-align: center;
      margin-bottom: 50px;
    }
    .logo-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px var(--glow-c);
      animation: pulse-ring 2.4s ease-in-out infinite;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: var(--accent); }
    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 10px var(--glow-c); }
      50%      { box-shadow: 0 0 28px var(--glow-c), 0 0 50px var(--glow-c); }
    }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(26px, 5vw, 49px);
      font-weight: 900;
      letter-spacing: .12em;
      background: linear-gradient(120deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 6px;

    }

    /* ── status badge ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      transition: background .4s, box-shadow .4s;
    }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 10px var(--green); animation: blink 1.8s infinite; }
    .status-dot.error   { background: #ff4466; box-shadow: 0 0 10px #ff4466; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }
    .status-text {
      font-size: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--dim);
      transition: color .4s;
    }
    .status-text.online { color: var(--green); }

    /* ── language row ── */
    .lang-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }
    .lang-block { display: flex; flex-direction: column; gap: 8px; }
    .lang-label {
      font-size: 13px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: bold;
    }
    .lang-select-wrap {
      position: relative;
    }
    select {
      appearance: none;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 12px 36px 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .3s, box-shadow .3s, background .4s, color .4s;
      outline: none;
    }
    select:hover, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(0,212,255,.2);
    }
    .lang-select-wrap::after {
      content: '▾';
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      pointer-events: none;
      font-size: 14px;
    }

    /* ── theme toggle ── */
    .theme-toggle {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 100;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: .12em;
      color: var(--dim);
      transition: all .3s;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 4px 18px var(--glow-c);
    }
    .theme-toggle .icon { font-size: 15px; transition: transform .4s; }
    .theme-toggle:hover .icon { transform: rotate(20deg); }

    /* arrow between langs — now a clickable swap btn */
    .arrow-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding-top: 20px;
    }
    .swap-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .25s;
      box-shadow: 0 0 10px var(--glow-c);
    }
    .swap-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--glow-c);
      background: rgba(0,212,255,.08);
    }
    .swap-btn svg {
      width: 22px; height: 22px;
      fill: none; stroke: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent));
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
    }
    .swap-btn.spinning svg { transform: rotate(180deg); }
    .swap-hint {
      font-size: 9px;
      letter-spacing: .15em;
      color: var(--dim);
      text-transform: uppercase;
    }

    /* ── main panel ── */
    .main-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color .3s, background .4s, box-shadow .3s;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,212,255,.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .card.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,.15); }
    .card-label {
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
    }
    .card.active .card-label-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .card-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      min-height: 80px;
      word-break: break-word;
    }
    .card-text.placeholder { color: var(--dim); font-style: italic; font-size: 13px; }
    .translated-card .card-text { color: var(--green); }
    .translated-card { border-color: rgba(0,255,170,.2); }
    .translated-card.has-text { border-color: var(--green); box-shadow: 0 0 20px rgba(0,255,170,.12); }

    /* ── waveform ── */
    .wave-section {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }
    .waveform-container {
      width: 100%;
      max-width: 500px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0 28px;
      transition: border-color .3s;
    }
    .waveform-container.recording { border-color: #ff4466; box-shadow: 0 0 20px rgba(255,68,102,.2); }
    .wave-bar {
      width: 4px;
      border-radius: 4px;
      background: var(--border);
      height: 12px;
      transition: background .3s;
    }
    .waveform-container.recording .wave-bar {
      background: #ff4466;
      animation: wave-anim 0.6s ease-in-out infinite alternate;
    }
    .wave-bar:nth-child(1)  { animation-delay: 0s;    }
    .wave-bar:nth-child(2)  { animation-delay: .05s;  }
    .wave-bar:nth-child(3)  { animation-delay: .1s;   }
    .wave-bar:nth-child(4)  { animation-delay: .15s;  }
    .wave-bar:nth-child(5)  { animation-delay: .2s;   }
    .wave-bar:nth-child(6)  { animation-delay: .25s;  }
    .wave-bar:nth-child(7)  { animation-delay: .3s;   }
    .wave-bar:nth-child(8)  { animation-delay: .35s;  }
    .wave-bar:nth-child(9)  { animation-delay: .4s;   }
    .wave-bar:nth-child(10) { animation-delay: .45s;  }
    .wave-bar:nth-child(11) { animation-delay: .4s;   }
    .wave-bar:nth-child(12) { animation-delay: .35s;  }
    .wave-bar:nth-child(13) { animation-delay: .3s;   }
    .wave-bar:nth-child(14) { animation-delay: .25s;  }
    .wave-bar:nth-child(15) { animation-delay: .2s;   }
    .wave-bar:nth-child(16) { animation-delay: .15s;  }
    .wave-bar:nth-child(17) { animation-delay: .1s;   }
    .wave-bar:nth-child(18) { animation-delay: .05s;  }
    .wave-bar:nth-child(19) { animation-delay: 0s;    }

    @keyframes wave-anim {
      0%   { height: 6px;  opacity:.6; }
      100% { height: 46px; opacity:1;  }
    }

    /* ── buttons ── */
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      padding: 16px 36px;
      transition: all .25s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,.08);
      opacity: 0;
      transition: opacity .2s;
      border-radius: inherit;
    }
    .btn:hover::after { opacity: 1; }
    .btn:active { transform: scale(.96); }

    .btn-start {
      background: linear-gradient(135deg, #ff3e6c 0%, #ff1744 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(255,62,108,.4);
    }
    .btn-start:hover { box-shadow: 0 6px 32px rgba(255,62,108,.6); transform: translateY(-2px); }
    .btn-start:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-stop {
      background: var(--panel);
      color: var(--accent);
      border: 1px solid var(--accent);
      box-shadow: 0 4px 20px rgba(0,212,255,.15);
    }
    .btn-stop:hover { box-shadow: 0 6px 28px rgba(0,212,255,.35); transform: translateY(-2px); background: rgba(0,212,255,.08); }
    .btn-stop:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    /* ── rec indicator ── */
    .rec-badge {
      display: none;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
      font-size: 11px;
      letter-spacing: .2em;
      color: #ff4466;
    }
    .rec-badge.visible { display: flex; }
    .rec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff4466;
      animation: blink 1s infinite;
    }

    /* ── footer ── */
    footer {
      text-align: center;
      margin-top: 60px;
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--dim);
    }

    @media (max-width: 580px) {
      .main-panel { grid-template-columns: 1fr; }
      .lang-row { grid-template-columns: 1fr auto 1fr; }
    }
  </style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
  <span class="icon" id="themeIcon">☀️</span>
  <span id="themeLabel">LIGHT</span>
</button>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo-line">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

  <!-- Status -->
  <div class="status-bar">

  <!-- Language Selection -->
  <div class="lang-row">

    <div class="arrow-mid">
      <button class="swap-btn" id="swapBtn" onclick="swapLanguages()" title="Swap languages">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="swap-hint">swap</span>
    </div>

    <div class="lang-block">
      <span class="lang-label">Target Language</span>
      <div class="lang-select-wrap">
        <select id="tgtLang">
          <option value="ta">🇮🇳 Tamil</option>
          <option value="en">🇬🇧 English</option>
          <option value="hi">🇮🇳 Hindi</option>
          <option value="te">🇮🇳 Telugu</option>
          <option value="fr">🇫🇷 French</option>
          <option value="de">🇩🇪 German</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="zh">🇨🇳 Chinese</option>

  </div>

  <!-- Waveform -->
  <div class="wave-section">
    <div class="waveform-container" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart" onclick="startRecording()">
      ● Start Speaking
    </button>
    <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
      ■ Stop &amp; Translate
    </button>
  </div>

  <!-- Recording indicator -->
  <div class="rec-badge" id="recBadge">
    <div class="rec-dot"></div>
    RECORDING IN PROGRESS
  </div>

  <!-- Output cards -->
  <div class="main-panel" style="margin-top:32px;">
    <div class="card" id="asrCard">
      <div class="card-label"><div class="card-label-dot"></div>Recognized Speech</div>
      <div class="card-text placeholder" id="asrText">Your speech will appear here…</div>
    </div>
    <div class="card translated-card" id="translatedCard">
      <div class="card-label"><div class="card-label-dot"></div>Translation Output</div>
      <div class="card-text placeholder" id="translatedText">Translation will appear here…</div>
    </div>
  </div>

</div>

<!-- <footer>VOICEBRIDGE v1.0 — NEURAL TRANSLATION ENGINE — WEBSOCKET CONNECTED</footer> -->

<script>
let mediaRecorder;
let audioChunks = [];
let ws;

function setStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.className = 'status-text ' + state;
  txt.textContent = msg;
}

function connectWebSocket() {
  setStatus('', 'Connecting to server…');
  ws = new WebSocket("wss://unsubrogated-monochromatically-destinee.ngrok-free.dev/ws");

  ws.onopen = () => setStatus('online', 'Server connected — ready to translate');

  ws.onmessage = async (event) => {
    const parsed = JSON.parse(event.data);
    const asrEl = document.getElementById('asrText');
    const trlEl = document.getElementById('translatedText');

    if (parsed.asr_text) {
      asrEl.textContent = parsed.asr_text;
      asrEl.classList.remove('placeholder');
      document.getElementById('asrCard').classList.add('active');
    }
    if (parsed.translated_text) {
      trlEl.textContent = parsed.translated_text;
      trlEl.classList.remove('placeholder');
      document.getElementById('translatedCard').classList.add('has-text');
    }
    if (parsed.audio_base64) playAudioFromBase64(parsed.audio_base64);
  };

  ws.onerror = () => setStatus('error', 'Connection error — check server');
  ws.onclose = () => {
    setStatus('error', 'Disconnected — retrying in 5s…');
    setTimeout(connectWebSocket, 5000);
  };
}

connectWebSocket();

async function startRecording() {
  audioChunks = [];
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.start();

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('waveform').classList.add('recording');
  document.getElementById('recBadge').classList.add('visible');

  // Reset cards
  const asrEl = document.getElementById('asrText');
  const trlEl = document.getElementById('translatedText');
  asrEl.textContent = 'Listening…';
  asrEl.classList.add('placeholder');
  trlEl.textContent = 'Waiting for speech…';
  trlEl.classList.add('placeholder');
  document.getElementById('asrCard').classList.remove('active');
  document.getElementById('translatedCard').classList.remove('has-text');
}

function stopRecording() {
  mediaRecorder.stop();
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('waveform').classList.remove('recording');
  document.getElementById('recBadge').classList.remove('visible');

  mediaRecorder.onstop = async () => {
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const arrayBuffer = await audioBlob.arrayBuffer();
    const uint8Array = new Uint8Array(arrayBuffer);
    const src = document.getElementById('srcLang').value;
    const tgt = document.getElementById('tgtLang').value;
    ws.send(JSON.stringify({ src, tgt }));
    setTimeout(() => ws.send(uint8Array), 100);

    document.getElementById('asrText').textContent = 'Processing…';
    document.getElementById('translatedText').textContent = 'Translating…';
  };
}

function swapLanguages() {
  const src = document.getElementById('srcLang');
  const tgt = document.getElementById('tgtLang');
  const btn = document.getElementById('swapBtn');

  // Animate
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 420);

  // Swap values
  const tmp = src.value;
  src.value = tgt.value;
  tgt.value = tmp;
}

function toggleTheme() {
  const isDark = document.body.getAttribute('data-theme') !== 'light';
  document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? 'DARK' : 'LIGHT';
}


function playAudioFromBase64(base64String) {
  try {
    const clean = base64String.includes(",") 
      ? base64String.split(",")[1] 
      : base64String;

    const bytes = Uint8Array.from(atob(clean), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);

    audio.play()
      .then(() => URL.revokeObjectURL(url))   // ← free memory after playing
      .catch(err => {
        console.warn("Autoplay blocked:", err);
        // Show a play button as fallback
        const btn = document.createElement('button');
        btn.textContent = '🔊 Play Translation';
        btn.onclick = () => { audio.play(); btn.remove(); };
        document.querySelector('.btn-row').appendChild(btn);
      });
  } catch (err) {
    console.error("Audio playback failed:", err);
  }
}
</script>
</body>
</html>
